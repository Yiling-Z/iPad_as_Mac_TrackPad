<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <style>
        body { 
            background: #1a1a1a; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            padding: 20px;
            margin: 0;
            overflow: hidden; /* 禁用页面滚动，避免干扰 */
        }
        #ip-input {
            width: 80%;
            padding: 12px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #333;
            color: #fff;
        }
        #connect-btn {
            padding: 12px 24px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #007aff;
            color: #fff;
            cursor: pointer;
            margin-bottom: 20px;
        }
        #pad {
            height: 70vh;
            background: #2d2d2d;
            border-radius: 12px;
            margin: 10px 0;
            touch-action: none; /* 完全禁用浏览器触摸行为 */
            position: relative;
        }
        #status {
            margin-top: 15px;
            font-size: 16px;
            color: #ccc;
        }
        .tips {
            font-size: 14px;
            color: #999;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <input type="text" id="ip-input" placeholder="输入Mac的局域网IP" value="192.168.0.109">
    <button id="connect-btn">连接Mac</button>
    <div id="pad">触控区域（滑动控制光标）</div>
    <div id="status">未连接</div>
    <div class="tips">轻触=左键 | 长按=右键 | 双指=滚动 | 滑动=移动光标</div>

    <script>
        let socket;
        let isConnected = false;
        let padRect; // 触控区域的坐标信息（核心：基于区域计算位移）
        let lastTouchX = 0;
        let lastTouchY = 0;
        let isSliding = false;
        let isLongPress = false;
        let longPressTimer = null;

        // 核心防抖/精准参数
        const SLIDE_THRESHOLD = 3;    // 滑动判定阈值（3px，更小更精准）
        const LONG_PRESS_TIME = 500;  // 长按时间
        const MIN_SEND_DELTA = 0.5;   // 最小发送位移（小于0.5px不发送，防抖）
        const SEND_INTERVAL = 16;     // 发送频率（60帧/秒，和屏幕刷新率对齐）
        let lastSendTime = 0;         // 上次发送时间（节流）

        // DOM元素
        const ipInput = document.getElementById('ip-input');
        const connectBtn = document.getElementById('connect-btn');
        const pad = document.getElementById('pad');
        const statusText = document.getElementById('status');

        // 初始化：获取触控区域坐标（避免全局坐标误差）
        function initPadRect() {
            padRect = pad.getBoundingClientRect();
        }
        // 窗口大小变化时重新获取（适配旋转）
        window.addEventListener('resize', initPadRect);
        // 页面加载时初始化
        window.addEventListener('load', initPadRect);

        // 1. 连接WebSocket
        connectBtn.addEventListener('click', () => {
            const macIp = ipInput.value.trim();
            if (!macIp) {
                alert('请输入Mac的局域网IP！');
                return;
            }

            if (socket) socket.close();
            socket = new WebSocket(`ws://${macIp}:8888`);
            
            socket.onopen = () => {
                isConnected = true;
                statusText.textContent = `已连接：${macIp}:8888`;
                statusText.style.color = '#34c759';
                initPadRect(); // 连接后重新获取触控区域坐标
            };

            socket.onerror = () => {
                isConnected = false;
                statusText.textContent = '连接失败：检查Mac服务/IP';
                statusText.style.color = '#ff3b30';
            };

            socket.onclose = () => {
                isConnected = false;
                statusText.textContent = '连接已断开（重新点击连接）';
                statusText.style.color = '#ff9500';
            };
        });

        // 2. 触摸开始：初始化状态
        pad.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!isConnected) {
                alert('请先连接Mac！');
                return;
            }

            // 重置所有状态
            isSliding = false;
            isLongPress = false;
            lastSendTime = 0;

            // 记录触控区域内的相对坐标（核心：避免全局坐标误差）
            const touch = e.touches[0];
            lastTouchX = touch.clientX - padRect.left;
            lastTouchY = touch.clientY - padRect.top;

            // 长按计时器
            longPressTimer = setTimeout(() => {
                isLongPress = true;
                socket.send('right');
                statusText.textContent = '触发右键';
            }, LONG_PRESS_TIME);
        });

        // 3. 触摸滑动：精准位移计算（核心修复漂移）
        pad.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isConnected || isLongPress) return;

            const now = Date.now();
            // 节流：60帧/秒发送，避免高频触发导致漂移
            if (now - lastSendTime < SEND_INTERVAL) return;

            const touch = e.touches[0];
            // 计算触控区域内的相对位移（仅基于触控板区域，无全局误差）
            const currentX = touch.clientX - padRect.left;
            const currentY = touch.clientY - padRect.top;
            let dx = currentX - lastTouchX;
            let dy = currentY - lastTouchY;

            // 更新上次触摸位置
            lastTouchX = currentX;
            lastTouchY = currentY;

            // 防抖：过滤微小位移（小于0.5px不发送）
            if (Math.abs(dx) < MIN_SEND_DELTA && Math.abs(dy) < MIN_SEND_DELTA) return;

            // 判定滑动（超过阈值）
            const distance = Math.sqrt(dx*dx + dy*dy);
            if (distance > SLIDE_THRESHOLD) {
                isSliding = true;
                clearTimeout(longPressTimer); // 滑动取消长按
            }

            // 双指滚动
            if (e.touches.length === 2) {
                socket.send(`scroll ${dy * -1}`);
                statusText.textContent = '滚动中';
            }
            // 单指移动（仅滑动时发送）
            else if (isSliding) {
                // 位移归一化：适配不同iPad屏幕尺寸，减少漂移
                dx = dx / padRect.width * 100;
                dy = dy / padRect.height * 100;
                socket.send(`move ${dx} ${dy}`);
                statusText.textContent = `移动中 (${dx.toFixed(1)}, ${dy.toFixed(1)})`;
            }

            lastSendTime = now;
        });

        // 4. 触摸结束：精准判定点击/滑动
        pad.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (!isConnected) return;

            clearTimeout(longPressTimer);
            // 仅轻触（未滑动）触发左键
            if (!isSliding && !isLongPress) {
                socket.send('click');
                statusText.textContent = '左键点击';
            } else if (isSliding) {
                statusText.textContent = '滑动结束（无点击）';
            }

            // 重置状态
            isSliding = false;
            isLongPress = false;
        });

        // 禁用所有默认触摸行为，避免干扰
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
