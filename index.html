<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <style>
        body { 
            background: #1a1a1a; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            padding: 20px;
            margin: 0;
            overflow: hidden;
        }
        #ip-input {
            width: 80%;
            padding: 12px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #333;
            color: #fff;
        }
        #connect-btn {
            padding: 12px 24px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #007aff;
            color: #fff;
            cursor: pointer;
            margin-bottom: 20px;
        }
        #pad {
            height: 70vh;
            background: #2d2d2d;
            border-radius: 12px;
            margin: 10px 0;
            touch-action: none;
            position: relative;
        }
        #status {
            margin-top: 15px;
            font-size: 16px;
            color: #ccc;
        }
        .tips {
            font-size: 14px;
            color: #999;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <input type="text" id="ip-input" placeholder="输入Mac的局域网IP" value="192.168.0.109">
    <button id="connect-btn">连接Mac</button>
    <div id="pad">触控区域（滑动控制光标）</div>
    <div id="status">未连接</div>
    <div class="tips">轻触=左键 | 长按=右键 | 双指=滚动 | 滑动=移动光标</div>

    <script>
        let socket;
        let isConnected = false;
        let padRect;
        let lastTouchX = 0;
        let lastTouchY = 0;
        let isSliding = false;
        let isLongPress = false;
        let longPressTimer = null;


        const SLIDE_THRESHOLD = 3;    
        const LONG_PRESS_TIME = 500;  
        const MIN_SEND_DELTA = 0.5;   
        const SEND_INTERVAL = 16;    
        let lastSendTime = 0;         

        const ipInput = document.getElementById('ip-input');
        const connectBtn = document.getElementById('connect-btn');
        const pad = document.getElementById('pad');
        const statusText = document.getElementById('status');

        function initPadRect() {
            padRect = pad.getBoundingClientRect();
        }
        window.addEventListener('resize', initPadRect);
        window.addEventListener('load', initPadRect);

        connectBtn.addEventListener('click', () => {
            const macIp = ipInput.value.trim();
            if (!macIp) {
                alert('请输入Mac的局域网IP！');
                return;
            }

            if (socket) socket.close();
            socket = new WebSocket(`ws://${macIp}:8888`);
            
            socket.onopen = () => {
                isConnected = true;
                statusText.textContent = `已连接：${macIp}:8888`;
                statusText.style.color = '#34c759';
                initPadRect(); 
            };

            socket.onerror = () => {
                isConnected = false;
                statusText.textContent = '连接失败：检查Mac服务/IP';
                statusText.style.color = '#ff3b30';
            };

            socket.onclose = () => {
                isConnected = false;
                statusText.textContent = '连接已断开（重新点击连接）';
                statusText.style.color = '#ff9500';
            };
        });

        pad.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!isConnected) {
                alert('请先连接Mac！');
                return;
            }

            isSliding = false;
            isLongPress = false;
            lastSendTime = 0;

            const touch = e.touches[0];
            lastTouchX = touch.clientX - padRect.left;
            lastTouchY = touch.clientY - padRect.top;

            longPressTimer = setTimeout(() => {
                isLongPress = true;
                socket.send('right');
                statusText.textContent = '触发右键';
            }, LONG_PRESS_TIME);
        });

        pad.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isConnected || isLongPress) return;

            const now = Date.now();
            if (now - lastSendTime < SEND_INTERVAL) return;

            const touch = e.touches[0];
            const currentX = touch.clientX - padRect.left;
            const currentY = touch.clientY - padRect.top;
            let dx = currentX - lastTouchX;
            let dy = currentY - lastTouchY;

            lastTouchX = currentX;
            lastTouchY = currentY;

            if (Math.abs(dx) < MIN_SEND_DELTA && Math.abs(dy) < MIN_SEND_DELTA) return;

            const distance = Math.sqrt(dx*dx + dy*dy);
            if (distance > SLIDE_THRESHOLD) {
                isSliding = true;
                clearTimeout(longPressTimer); 
            }

            if (e.touches.length === 2) {
                socket.send(`scroll ${dy * -1}`);
                statusText.textContent = '滚动中';
            }

            else if (isSliding) {
                dx = dx / padRect.width * 100;
                dy = dy / padRect.height * 100;
                socket.send(`move ${dx} ${dy}`);
                statusText.textContent = `移动中 (${dx.toFixed(1)}, ${dy.toFixed(1)})`;
            }

            lastSendTime = now;
        });

        pad.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (!isConnected) return;

            clearTimeout(longPressTimer);
            if (!isSliding && !isLongPress) {
                socket.send('click');
                statusText.textContent = '左键点击';
            } else if (isSliding) {
                statusText.textContent = '滑动结束（无点击）';
            }

            isSliding = false;
            isLongPress = false;
        });

        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
